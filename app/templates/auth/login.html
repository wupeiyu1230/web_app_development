{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="fw-bold text-center mb-4">會員登入</h3>
                <form action="{{ url_for('auth.login_submit') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">電子信箱</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">登入</button>
                    <div class="text-center mt-3">
                        <small class="text-muted">還沒有帳號嗎？<a href="{{ url_for('auth.register_form') }}">註冊</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
