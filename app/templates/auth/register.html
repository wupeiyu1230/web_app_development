{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="fw-bold text-center mb-4">註冊新帳號</h3>
                <form action="{{ url_for('auth.register_submit') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">使用者名稱</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">電子信箱</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">立即註冊</button>
                    <div class="text-center mt-3">
                        <small class="text-muted">已經有帳號了？<a href="{{ url_for('auth.login_form') }}">登入</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
