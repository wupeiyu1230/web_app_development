{% extends "base.html" %}
{% block content %}
<ul class="nav nav-pills mb-4" id="profileTabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="saved-tab" data-bs-toggle="tab" data-bs-target="#saved" type="button" role="tab">我的收藏 ({{ saved_recipes|length }})</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="mine-tab" data-bs-toggle="tab" data-bs-target="#mine" type="button" role="tab">我的發布 ({{ my_recipes|length }})</button>
  </li>
</ul>

<div class="tab-content" id="myTabContent">
  <div class="tab-pane fade show active" id="saved" role="tabpanel">
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for recipe in saved_recipes %}
        <div class="col">
            <div class="card recipe-card h-100">
                <div class="card-body">
                    <h5 class="fw-bold"><a href="{{ url_for('recipes.view_recipe', recipe_id=recipe.id) }}" class="text-dark text-decoration-none stretched-link">{{ recipe.title }}</a></h5>
                    <p class="small text-muted">{{ recipe.description[:50] }}...</p>
                    <div class="position-relative z-3">
                        <form action="{{ url_for('recipes.unsave_recipe', recipe_id=recipe.id) }}" method="POST">
                            <button class="btn btn-sm btn-outline-danger w-100">移除收藏</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-muted">尚無收藏的食譜。</div>
        {% endfor %}
    </div>
  </div>
  <div class="tab-pane fade" id="mine" role="tabpanel">
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for recipe in my_recipes %}
        <div class="col">
            <div class="card recipe-card h-100">
                <div class="card-body">
                    <h5 class="fw-bold"><a href="{{ url_for('recipes.view_recipe', recipe_id=recipe.id) }}" class="text-dark text-decoration-none stretched-link">{{ recipe.title }}</a></h5>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-muted">您還沒有發布任何食譜。</div>
        {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
